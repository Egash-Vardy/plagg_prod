<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagg Prod | Магазин</title>
    <style>
        /* Стили прежние, добавлено только новое */
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding-bottom: 50px; }
        
        /* Уведомление-тост */
        #toast { position: fixed; bottom: 20px; right: 20px; background: #28a745; color: white; padding: 15px 25px; border-radius: 8px; display: none; z-index: 1000; }
        
        /* Модалки и кнопки */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 500; }
        .modal-content { background: #252525; margin: 10% auto; padding: 30px; width: 300px; border-radius: 15px; border: 1px solid #444; }
        input { width: 90%; padding: 10px; margin: 5px 0; background: #333; border: 1px solid #555; color: white; border-radius: 5px; }
        button { background: #ffcc00; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Plagg Prod</h1>
    <div id="productContainer"></div>

    <footer>
        <button class="admin-trigger" onclick="openLoginModal()" style="background:transparent; color:#555; border:none; cursor:pointer;">⚙️</button>
    </footer>

    <div id="toast"></div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3>Вход администратора</h3>
            <input type="text" id="adminUser" placeholder="Имя">
            <input type="password" id="adminPass" placeholder="Пароль">
            <button onclick="authAdmin()">Войти</button>
            <button onclick="closeModal('loginModal')" style="background:none; color:white;">Отмена</button>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content" style="width: 400px;">
            <h3>Настройки</h3>
            <div id="adminFields"></div>
            <button onclick="saveChanges()">Сохранить</button>
        </div>
    </div>

    <script>
        // Показ уведомления (вместо alert)
        function showToast(msg, color = "#28a745") {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = color;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // Вход в админку (вместо prompt)
        function openLoginModal() { document.getElementById('loginModal').style.display = 'block'; }
        
        function authAdmin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            if(u === "Plagg" && p === "plagg_nn") {
                document.getElementById('loginModal').style.display = 'none';
                openAdmin();
            } else {
                showToast("Ошибка доступа!", "#dc3545");
            }
        }
        
        // ... остальной код (render, save, и т.д.) без изменений ...
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
