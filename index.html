<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagg Prod | Магазин услуг</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 40px 20px; background: #1a1a1a; border-bottom: 2px solid #ffcc00; }
        header h1 { margin: 0; color: #ffcc00; font-size: 2.5em; letter-spacing: 2px; text-transform: uppercase; }
        
        .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; flex: 1; padding: 20px; align-items: flex-start; }
        
        /* Стили карточки товара */
        .card { background: #1e1e1e; padding: 0 0 20px 0; border-radius: 15px; width: 280px; border: 1px solid #333; position: relative; transition: 0.3s; overflow: hidden; display: flex; flex-direction: column; }
        .card:hover { border-color: #ffcc00; transform: translateY(-5px); }
        
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #2a2a2a; border-bottom: 1px solid #333; }
        .card-content { padding: 0 20px; flex: 1; }
        .card h3 { margin: 15px 0 10px 0; font-size: 1.4em; }
        .card p { margin: 0 0 15px 0; color: #ccc; }
        
        .discount-badge { background: #ff3e3e; color: white; padding: 5px 10px; border-radius: 0 0 0 10px; font-size: 0.8em; position: absolute; top: 0; right: 0; font-weight: bold; z-index: 10; }
        
        button { background: #ffcc00; border: none; padding: 12px 25px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; width: 100%; max-width: 200px; }
        button:hover { background: #e6b800; }
        
        footer { margin-top: 50px; padding: 30px 20px; font-size: 0.8em; color: #888; border-top: 1px solid #333; background: #1a1a1a; }
        .admin-trigger { background: transparent; color: #333; border: none; cursor: pointer; font-size: 0.9em; margin-top: 15px; padding: 5px; }
        .admin-trigger:hover { color: #555; }

        /* Модальные окна */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto; padding-top: 50px; }
        .modal-content { background: #252525; margin: 0 auto 50px auto; padding: 30px; width: 90%; max-width: 450px; border-radius: 15px; text-align: left; border: 1px solid #444; position: relative; }
        .modal-content h2 { margin-top: 0; color: #ffcc00; text-align: center; }
        
        .admin-item-block { border: 1px solid #444; padding: 15px; margin-bottom: 20px; border-radius: 10px; background: #1e1e1e; position: relative; }
        .admin-item-block label { display: block; font-size: 0.85em; color: #aaa; margin-bottom: 3px; }
        .modal-content input { width: 100%; padding: 10px; margin: 0 0 15px 0; background: #333; border: 1px solid #555; color: white; border-radius: 5px; box-sizing: border-box; }
        
        .add-btn { background: #007bff; color: white; width: 100%; margin-bottom: 15px; max-width: none; }
        .add-btn:hover { background: #0069d9; }
        .save-btn { background: #28a745; color: white; width: 100%; max-width: none; font-size: 1.1em; }
        .save-btn:hover { background: #218838; }
        
        .del-btn { background: #dc3545; color: white; padding: 5px 10px; font-size: 0.8em; position: absolute; top: 10px; right: 10px; width: auto; }
        .del-btn:hover { background: #c82333; }
        
        .close-btn { background: #555; color: white; margin-top: 15px; width: 100%; max-width: none; }
        .close-btn:hover { background: #444; }

        /* Адаптивность */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8em; }
            .card { width: 100%; max-width: 320px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Plagg Prod</h1>
    </header>

    <div class="container" id="productContainer">
        </div>

    <footer>
        <p>© 2026 Plagg Prod. Все права защищены.</p>
        <p>Важное примечание: Продавец не несет ответственности за комиссию платформы при переводе средств.</p>
        <p>Для связи: <a href="https://t.me/ТВОЙ_НИК" style="color: #ffcc00; text-decoration: none;">@ТВОЙ_НИК</a></p>
        <button class="admin-trigger" onclick="checkAdmin()">⚙️</button>
    </footer>

    <div id="buyModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h2 id="modalText"></h2>
            <img id="modalImg" src="" alt="" style="width: 100%; height: 150px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; display: none; border: 1px solid #333;">
            <p>Для покупки напишите мне в Telegram:</p>
            <a href="https://t.me/ТВОЙ_НИК" style="color: #ffcc00; font-size: 1.3em; text-decoration: none; font-weight: bold; background: rgba(255,204,0,0.1); padding: 10px 20px; border-radius: 8px; display: inline-block; margin-top: 10px;">Написать @ТВОЙ_НИК</a>
            <button class="close-btn" onclick="closeModal('buyModal')">Закрыть</button>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h2>Управление товарами</h2>
            <button class="add-btn" onclick="addProductField()">+ Добавить новый товар</button>
            <div id="adminFields">
                </div>
            <button class="save-btn" onclick="saveChanges()">✅ Сохранить изменения</button>
            <button class="close-btn" onclick="closeModal('adminModal')">Отмена</button>
        </div>
    </div>

    <script>
        // Данные по умолчанию (если память браузера пуста)
        // Замени 'ССЫЛКА_НА_КАРТИНКУ' на реальные URL
        const defaultProducts = [
            { name: "Водяной знак", price: 50, discount: "", img: "https://via.placeholder.com/300x200?text=Watermark" },
            { name: "Заказ эдита", price: 350, discount: "10", img: "https://via.placeholder.com/300x200?text=Edit" },
            { name: "Фото под заказ", price: 85, discount: "", img: "https://via.placeholder.com/300x200?text=Photo" }
        ];

        // Загрузка данных
        let products = JSON.parse(localStorage.getItem('plagg_products_v2')) || defaultProducts;

        // Отрисовка витрины
        function renderProducts() {
            const container = document.getElementById('productContainer');
            container.innerHTML = '';
            
            if (products.length === 0) {
                container.innerHTML = '<p style="color: #888; margin-top: 50px;">Магазин пока пуст...</p>';
                return;
            }

            products.forEach((p, index) => {
                const discountHtml = p.discount ? `<div class="discount-badge">-${p.discount}%</div>` : '';
                const imgSrc = p.img || 'https://via.placeholder.com/300x200?text=No+Image';
                
                container.innerHTML += `
                    <div class="card">
                        ${discountHtml}
                        <img src="${imgSrc}" alt="${p.name}" class="card-img" onerror="this.src='https://via.placeholder.com/300x200?text=Error'">
                        <div class="card-content">
                            <h3>${p.name}</h3>
                            <p>Цена: <b style="color: #ffcc00; font-size: 1.2em;">${p.price} звезд</b></p>
                            <button onclick="openBuyModal(${index})">Купить</button>
                        </div>
                    </div>
                `;
            });
        }

        // Логика админки
        function checkAdmin() {
            // Введите Имя: Plagg, Пароль: plagg_nn
            if (prompt("Имя администратора:") === "Plagg" && prompt("Пароль:") === "plagg_nn") {
                openAdmin();
            } else {
                alert("Доступ запрещен!");
            }
        }

        function openAdmin() {
            renderAdminFields();
            document.getElementById('adminModal').style.display = "block";
            document.body.style.overflow = 'hidden'; // Запретить прокрутку фона
        }

        function renderAdminFields() {
            const fields = document.getElementById('adminFields');
            fields.innerHTML = '';
            products.forEach((p, index) => {
                fields.innerHTML += `
                    <div class="admin-item-block">
                        <button class="del-btn" onclick="removeProduct(${index})">Удалить</button>
                        <h4 style="margin: 0 0 15px 0; color: #aaa;">Товар #${index + 1}</h4>
                        
                        <label>Название товара:</label>
                        <input type="text" value="${p.name}" class="edit-name" placeholder="Например: Супер Эдит">
                        
                        <label>Ссылка на картинку (URL):</label>
                        <input type="text" value="${p.img}" class="edit-img" placeholder="https://site.com/image.jpg">
                        
                        <div style="display: flex; gap: 10px;">
                            <div style="flex: 1;">
                                <label>Цена (звезд):</label>
                                <input type="number" value="${p.price}" class="edit-price" placeholder="100">
                            </div>
                            <div style="flex: 1;">
                                <label>Скидка % (пусто = нет):</label>
                                <input type="text" value="${p.discount}" class="edit-disc" placeholder="15">
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function addProductField() {
            products.push({ name: "Новый товар", price: 0, discount: "", img: "" });
            renderAdminFields();
            // Прокрутка вниз к новому товару
            setTimeout(() => {
                const modal = document.getElementById('adminModal');
                modal.scrollTop = modal.scrollHeight;
            }, 100);
        }

        function removeProduct(index) {
            if(confirm(`Удалить товар "${products[index].name}"?`)) {
                products.splice(index, 1);
                renderAdminFields();
            }
        }

        function saveChanges() {
            const names = document.querySelectorAll('.edit-name');
            const prices = document.querySelectorAll('.edit-price');
            const discs = document.querySelectorAll('.edit-disc');
            const imgs = document.querySelectorAll('.edit-img');

            products = [];
            names.forEach((n, i) => {
                // Базовая валидация цены
                let priceVal = parseInt(prices[i].value) || 0;
                if (priceVal < 0) priceVal = 0;

                products.push({
                    name: n.value || "Без названия",
                    price: priceVal,
                    discount: discs[i].value.replace('%', '').trim(), // Убираем % если юзер ввел
                    img: imgs[i].value.trim()
                });
            });

            // Сохранение в LocalStorage (версия 2 с картинками)
            localStorage.setItem('plagg_products_v2', JSON.stringify(products));
            alert("Изменения сохранены в вашем браузере!");
            location.reload();
        }

        // Логика окон
        function openBuyModal(index) {
            const p = products[index];
            document.getElementById('modalText').innerText = p.name;
            
            const mImg = document.getElementById('modalImg');
            if (p.img) {
                mImg.src = p.img;
                mImg.style.display = 'block';
                mImg.onerror = function() { this.style.display = 'none'; }; // Скрыть если ссылка битая
            } else {
                mImg.style.display = 'none';
            }
            
            document.getElementById('buyModal').style.display = "block";
            document.body.style.overflow = 'hidden';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = "none";
            document.body.style.overflow = 'auto'; // Вернуть прокрутку
        }

        // Закрытие модалки при клике вне контента
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = "none";
                document.body.style.overflow = 'auto';
            }
        }

        // Старт
        renderProducts();
    </script>
</body>
</html>
